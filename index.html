<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Simple Flashcards v14.5 (Auto-Play)</title>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --accent: #38bdf8;
    --success: #22c55e;
    --error: #ef4444;
    --star: #facc15;
    --border: #334155;
    --btn-secondary: #475569;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    align-items: center;
  }
  .container {
    width: 100%;
    max-width: 600px;
    padding: 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  
  header {
    margin-bottom: 8px;
    display: flex;
    flex-direction: row;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  input[type="file"] { display: none; }
  .btn-file {
    background: #0ea5e9;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: bold;
    display: inline-flex;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .btn-file:hover { opacity: 0.9; }
  
  .chk-label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    background: #1e293b;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  input[type="checkbox"] { transform: scale(1.1); margin: 0; }

  .btn-clear {
    background: #ef4444;
    font-size: 12px;
    padding: 8px 10px;
  }

  .file-name-display {
    font-size: 14px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    font-weight: bold;
    min-height: 20px;
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .stat-left { color: var(--star); font-weight: bold; }
  .stat-right { color: #94a3b8; }

  .card-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    cursor: pointer; 
    min-height: 200px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 20px; 
    height: 100%;
    max-height: 55vh;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    
    display: flex;
    flex-direction: column;
    overflow-y: auto; 
  }

  .card::before,
  .card::after {
    content: "";
    flex: 1;
    min-height: 0;
  }

  .card::-webkit-scrollbar { width: 8px; }
  .card::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 8px; }
  .card::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
  .card::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .card-inner {
    flex: 0 0 auto;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    white-space: pre-wrap;
    width: 100%;
  }

  .star-btn {
    position: absolute;
    top: -12px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 32px;
    cursor: pointer;
    z-index: 20;
    padding: 0;
    user-select: none;
    color: #64748b; 
  }
  .star-btn.active { color: var(--star); } 
  .star-btn:active { transform: scale(1.2); }
  
  .error-msg { font-size: 16px; color: var(--error); text-align: left; }
  .loading-msg { font-size: 18px; color: var(--accent); }
  .info-msg { font-size: 16px; color: var(--accent); margin-bottom: 10px; display:block; }
  .pc-hint { font-size: 12px; color: #64748b; margin-top: 10px; display: block; font-weight: normal; }

  .label {
    position: absolute;
    top: -10px;
    left: 20px;
    background: var(--accent);
    color: #000;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: bold;
    z-index: 10;
  }
  
  .footer-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }
  .position-info {
    font-size: 14px;
    color: #cbd5e1;
    min-width: 70px;
    text-align: center;
  }
  .btn-skip {
    background: #334155;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-skip:active { background: #475569; color: #fff; }
  .btn-skip:hover { background: #475569; color: #fff; }

  .jump-container {
    text-align: center;
    margin-top: 8px;
    height: 24px; 
  }
  .btn-jump {
    background: transparent;
    border: none;
    color: #64748b;
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }
  .btn-jump:hover { color: #94a3b8; }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 10px;
    height: 60px;
    margin-top: 5px;
    margin-bottom: 10px;
  }
  button {
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    padding: 0;
  }
  .btn-prev { background: var(--btn-secondary); }
  .btn-next { background: var(--accent); color: #0f172a; font-size: 18px; }
  .btn-known { background: var(--success); color: #fff; }
  button:active { opacity: 0.8; transform: translateY(1px); }
  button:hover { opacity: 0.9; }

  .finished-msg { color: #4ade80; font-size: 20px; line-height: 1.6; }
  .sub-msg { font-size: 14px; color: #cbd5e1; margin-top: 10px; display:block; }
</style>
</head>
<body>

<div class="container">
  <header>
    <label class="btn-file">
      📂 ファイル
      <input type="file" id="fileInput">
    </label>
    <label class="chk-label"><input type="checkbox" id="chkShuffle"> 🔀</label>
    <label class="chk-label"><input type="checkbox" id="chkSpeakFront"> 🔊表</label>
    <label class="chk-label"><input type="checkbox" id="chkSpeakBack"> 🔊裏</label>
    <label class="chk-label" style="border-color:var(--star);"><input type="checkbox" id="chkStarOnly"> ★のみ</label>
    <button class="btn-file btn-clear" onclick="clearData()">初期化</button>
  </header>

  <div class="file-name-display" id="fileNameDisplay"></div>

  <div class="stats-bar">
    <span class="stat-left" id="lblRemaining">あと -- 枚</span>
    <span class="stat-right" id="lblTotal">全 -- 枚</span>
  </div>

  <div class="card-area" id="cardArea" onclick="stepNext(event)">
    <div class="label" id="sideLabel" style="display:none">FRONT</div>
    <button class="star-btn" id="btnStar" onclick="toggleStar(event)" style="display:none;">☆</button>
    <div class="card" id="cardScrollArea">
      <div class="card-inner" id="cardText">
        上の「📂 ファイル」から<br>データを選んでください
        <span class="pc-hint">※PC操作：Space/→:次へ | ←:戻る | ↑:覚えた | S:★ | A:自動</span>
      </div>
    </div>
  </div>

  <div class="footer-controls">
    <button class="btn-skip" id="btnSkipPrev" onclick="skipIndex(-1)">-10</button>
    <span class="position-info" id="lblPosition">-- / --</span>
    <button class="btn-skip" id="btnSkipNext" onclick="skipIndex(1)">+10</button>
    <button class="btn-skip" id="btnAutoPlay" onclick="toggleAutoPlay(event)" style="margin-left: 8px; min-width: 75px;">▶ 自動</button>
  </div>
  
  <div class="jump-container">
    <button class="btn-jump" id="btnJump" onclick="jumpToCard(event)" style="display:none;">No.を指定して移動</button>
  </div>

  <div class="action-row">
    <button class="btn-prev" id="btnPrev" onclick="stepPrev(event)">戻る</button>
    <button class="btn-known" id="btnKnown" onclick="markAsKnown(event)">覚えた！</button>
    <button class="btn-next" id="btnNext" onclick="stepNext(event, true)">次へ</button>
  </div>
</div>

<script>
  // ==========================================
  // ★ カスタマイズ設定（数字を書き換えて調整できます）
  // ==========================================
  const SKIP_STEP = 10; 
  const AUTO_SEC_FRONT = 1; // 表面を表示する秒数（オートプレイ時）
  const AUTO_SEC_BACK = 1; // 裏面を表示する秒数（オートプレイ時）
  // ==========================================

  const STORAGE_PREFIX = 'fc_deck_v14_'; 
  const LAST_FILE_KEY = 'fc_last_file_v14';

  let currentFileName = ""; 
  let rawDeck = [];       
  let activeDeck = [];    
  let currentSession = []; 
  let currentIndex = 0;    
  let isFront = true;      
  
  let starredIds = new Set(); 

  // ★ オートプレイ用変数
  let autoPlayTimer = null;
  let isAutoPlaying = false;

  const fileInput = document.getElementById('fileInput');
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const chkShuffle = document.getElementById('chkShuffle');
  const chkSpeakFront = document.getElementById('chkSpeakFront');
  const chkSpeakBack = document.getElementById('chkSpeakBack');
  const chkStarOnly = document.getElementById('chkStarOnly');
  
  const cardText = document.getElementById('cardText');
  const sideLabel = document.getElementById('sideLabel');
  const btnStar = document.getElementById('btnStar');
  const cardScrollArea = document.getElementById('cardScrollArea');
  const btnAutoPlay = document.getElementById('btnAutoPlay');
  
  const lblRemaining = document.getElementById('lblRemaining');
  const lblTotal = document.getElementById('lblTotal');
  const lblPosition = document.getElementById('lblPosition');
  
  const btnSkipPrev = document.getElementById('btnSkipPrev');
  const btnSkipNext = document.getElementById('btnSkipNext');
  const btnJump = document.getElementById('btnJump');
  const btnNext = document.getElementById('btnNext');
  const btnKnown = document.getElementById('btnKnown');

  function isDeckChanged(oldDeck, newDeck) {
      if (!oldDeck || !newDeck) return true;
      if (oldDeck.length !== newDeck.length) return true;
      for (let i = 0; i < oldDeck.length; i++) {
          if (oldDeck[i].front !== newDeck[i].front || oldDeck[i].back !== newDeck[i].back) {
              return true;
          }
      }
      return false;
  }

  window.addEventListener('DOMContentLoaded', () => {
    btnSkipPrev.textContent = `-${SKIP_STEP}`;
    btnSkipNext.textContent = `+${SKIP_STEP}`;
    
    const lastFile = localStorage.getItem(LAST_FILE_KEY);
    if (lastFile) {
      currentFileName = lastFile;
      const loaded = loadProgress(currentFileName, null);
      if (!loaded) {
         currentFileName = ""; 
      }
    }
    updateFileNameDisplay();
  });

  chkShuffle.addEventListener('change', saveToStorage);
  chkSpeakFront.addEventListener('change', saveToStorage);
  chkSpeakBack.addEventListener('change', saveToStorage);

  chkStarOnly.addEventListener('change', () => {
    saveToStorage();
    if(rawDeck.length > 0) startRound();
  });

  document.addEventListener('keydown', (e) => {
    if (rawDeck.length === 0) return;
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
      e.preventDefault(); stepNext(null, true);
    } else if (e.code === 'ArrowLeft') {
      e.preventDefault(); stepPrev();
    } else if (e.code === 'ArrowUp') {
      e.preventDefault(); markAsKnown();
    } else if (e.code === 'KeyS') {
      e.preventDefault(); toggleStar();
    } else if (e.code === 'KeyA') { // ★ AキーでオートプレイON/OFF
      e.preventDefault(); toggleAutoPlay();
    }
  });

  function speakEnglish(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel(); 
    const cleanText = text.replace(/\\n/g, ' ').replace(/\n/g, ' ');
    if (!cleanText.trim()) return;

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'en-US'; 
    window.speechSynthesis.speak(utterance);
  }

  function saveToStorage() {
    if (!currentFileName) return;
    const data = {
      rawDeck: rawDeck,
      activeDeck: activeDeck,
      currentSession: currentSession,
      savedIndex: currentIndex,
      starredIds: Array.from(starredIds), 
      optShuffle: chkShuffle.checked,
      optSpeakFront: chkSpeakFront.checked,
      optSpeakBack: chkSpeakBack.checked,
      optStarOnly: chkStarOnly.checked
    };
    try {
      localStorage.setItem(STORAGE_PREFIX + currentFileName, JSON.stringify(data));
      localStorage.setItem(LAST_FILE_KEY, currentFileName);
    } catch(e) {}
  }

  function loadProgress(fileName, newlyParsedDeck) {
    try {
      const json = localStorage.getItem(STORAGE_PREFIX + fileName);
      if (!json) return false;

      const data = JSON.parse(json);
      
      if (data.optShuffle !== undefined) chkShuffle.checked = data.optShuffle;
      if (data.optSpeakFront !== undefined) chkSpeakFront.checked = data.optSpeakFront;
      if (data.optSpeakBack !== undefined) chkSpeakBack.checked = data.optSpeakBack;
      if (data.optStarOnly !== undefined) chkStarOnly.checked = data.optStarOnly;
      
      if (data.starredIds) starredIds = new Set(data.starredIds);

      if (newlyParsedDeck && data.rawDeck) {
         if (isDeckChanged(data.rawDeck, newlyParsedDeck)) {
             
             const activeIds = new Set((data.activeDeck || []).map(c => c.id));
             const learnedIds = new Set();
             data.rawDeck.forEach(c => {
                 if (!activeIds.has(c.id)) learnedIds.add(c.id);
             });

             rawDeck = newlyParsedDeck;
             activeDeck = newlyParsedDeck.filter(c => !learnedIds.has(c.id));

             if (data.currentSession && data.currentSession.length > 0) {
                 currentSession = data.currentSession.map(oldCard => {
                     const updatedCard = newlyParsedDeck.find(c => c.id === oldCard.id);
                     return updatedCard ? updatedCard : oldCard;
                 });
             } else {
                 currentSession = [];
             }

             starredIds = new Set(Array.from(starredIds).filter(id => id < newlyParsedDeck.length));
             if (typeof data.savedIndex === 'number' && data.savedIndex < currentSession.length) {
                 currentIndex = data.savedIndex;
             } else {
                 currentIndex = 0;
             }

             render(false);
             cardText.innerHTML = `<span class='info-msg'>テキストの変更を反映し、<br>進捗を引き継ぎました</span><br>▼ タップして再開`;
             isFront = true;
             saveToStorage(); 
             return true;
         }
      }

      if (data.rawDeck && data.rawDeck.length > 0) {
        rawDeck = data.rawDeck;
        activeDeck = data.activeDeck || [...rawDeck];
        
        if (data.currentSession && data.currentSession.length > 0) {
          currentSession = data.currentSession;
        } else {
          startRound(); 
          return true;  
        }

        if (typeof data.savedIndex === 'number' && data.savedIndex < currentSession.length) {
          currentIndex = data.savedIndex;
        } else {
          currentIndex = 0;
        }

        render(false); 
        cardText.innerHTML = `<span class='info-msg'>「${fileName}」の<br>進捗と順番を復元しました</span><br>▼ タップして再開`;
        isFront = true;
        return true;
      }
    } catch(e) {}
    return false;
  }

  function clearData() {
    if(!currentFileName) return;
    if(!confirm(`現在開いている「${currentFileName}」の進捗データ（覚えた記録、★など）を全て削除して初期化しますか？`)) return;
    
    if (isAutoPlaying) toggleAutoPlay(); // 念のため自動再生ストップ
    localStorage.removeItem(STORAGE_PREFIX + currentFileName);
    starredIds.clear();
    chkStarOnly.checked = false;
    fullReset(); 
  }

  function updateFileNameDisplay() {
    fileNameDisplay.textContent = currentFileName ? `📂 ${currentFileName}` : "";
  }

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (isAutoPlaying) toggleAutoPlay(); // ファイル読込時は自動再生ストップ
    currentFileName = file.name; 
    updateFileNameDisplay();

    cardText.innerHTML = "<span class='loading-msg'>ファイルを解析中...</span>";
    sideLabel.style.display = 'none';

    try {
      const text = await file.text();
      parseText(text);
    } catch (err) {
      showError("ファイルの読み込みに失敗しました。");
    }
    fileInput.value = '';
  });

  function showError(msg) {
    cardText.innerHTML = `<div class='error-msg'>⚠️ エラー<br>${msg}</div>`;
    sideLabel.style.display = 'none';
    btnJump.style.display = 'none';
    btnStar.style.display = 'none';
  }

  function parseText(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
    let separator = ',';
    if (lines[0] && lines[0].includes('\t')) separator = '\t';

    let tempDeck = [];
    lines.forEach((line, idx) => {
      const parts = line.split(separator);
      if (parts.length >= 2) {
        tempDeck.push({ 
          id: idx,
          front: parts[0].trim(), 
          back: (parts[1] ? parts[1].trim() : "") 
        });
      }
    });

    if (tempDeck.length === 0) {
      showError("有効なカードが見つかりませんでした。");
      return;
    }

    const loaded = loadProgress(currentFileName, tempDeck);
    if (!loaded) {
      rawDeck = tempDeck;
      starredIds.clear();
      chkStarOnly.checked = false;
      fullReset(); 
    }
  }

  function fullReset() {
    if(rawDeck.length === 0) return;
    activeDeck = [...rawDeck];
    currentIndex = 0;
    startRound();
    saveToStorage();
  }

  function startRound() {
    if (chkStarOnly.checked) {
      currentSession = activeDeck.filter(c => starredIds.has(c.id));
    } else {
      currentSession = [...activeDeck];
    }
    
    if (chkShuffle.checked) shuffleArray(currentSession);
    
    isFront = true;
    currentIndex = 0;
    render(true); 
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // ★ オートプレイのON/OFF切り替え関数
  function toggleAutoPlay(e) {
    if(e) e.stopPropagation();
    if (rawDeck.length === 0) return;
    // 完了画面では開始しない
    if (currentIndex >= currentSession.length || currentSession.length === 0) return;

    isAutoPlaying = !isAutoPlaying;

    if (isAutoPlaying) {
      btnAutoPlay.textContent = '⏸ 停止';
      btnAutoPlay.style.background = '#ef4444';
      btnAutoPlay.style.color = '#fff';
      btnAutoPlay.style.borderColor = '#ef4444';
      render(false); // タイマーを始動させるために再描画（音声は重複しないようfalse）
    } else {
      btnAutoPlay.textContent = '▶ 自動';
      btnAutoPlay.style.background = '#334155';
      btnAutoPlay.style.color = '#94a3b8';
      btnAutoPlay.style.borderColor = '#475569';
      clearTimeout(autoPlayTimer);
    }
  }

  function toggleStar(e) {
    if(e) e.stopPropagation();
    if (currentSession.length === 0 || currentIndex >= currentSession.length) return;
    
    const currentCard = currentSession[currentIndex];
    if (starredIds.has(currentCard.id)) {
      starredIds.delete(currentCard.id);
    } else {
      starredIds.add(currentCard.id);
    }
    
    saveToStorage();
    render(false); 
  }

  function markAsKnown(e) {
    if(e) e.stopPropagation();
    if (currentSession.length === 0 || currentIndex >= currentSession.length) return;
    const currentCard = currentSession[currentIndex];
    
    activeDeck = activeDeck.filter(c => c.id !== currentCard.id);
    saveToStorage();
    stepNext(null, true);
  }

  function skipIndex(direction) {
    if(currentSession.length === 0) return;
    
    if(currentIndex >= currentSession.length) {
      if(direction < 0) currentIndex = currentSession.length - 1;
      else return;
    } else {
      currentIndex += direction * SKIP_STEP;
    }

    if(currentIndex < 0) currentIndex = 0;
    if(currentIndex >= currentSession.length) currentIndex = currentSession.length - 1;

    isFront = true; 
    render(true);
    saveToStorage();
  }

  function jumpToCard(e) {
    if(e) e.stopPropagation();
    if(currentSession.length === 0) return;

    const input = prompt(`No.を指定して移動 (1～${currentSession.length})`);
    if(input === null) return;

    const num = parseInt(input, 10);
    if(isNaN(num) || num < 1 || num > currentSession.length) {
      alert("番号が正しくありません");
      return;
    }

    currentIndex = num - 1;
    isFront = true;
    render(true);
    saveToStorage();
  }

  function render(playAudio = true) {
    if (rawDeck.length > 0) {
        if (chkStarOnly.checked) {
          const starRemaining = activeDeck.filter(c => starredIds.has(c.id)).length;
          lblRemaining.textContent = `あと ${starRemaining} 枚 (★)`;
        } else {
          lblRemaining.textContent = `あと ${activeDeck.length} 枚`;
        }
        lblTotal.textContent = `全 ${rawDeck.length} 枚`;
    } else {
        lblRemaining.textContent = `あと -- 枚`;
        lblTotal.textContent = `全 -- 枚`;
    }

    if (rawDeck.length === 0) {
      btnJump.style.display = 'none';
      btnStar.style.display = 'none';
      btnAutoPlay.style.display = 'none';
      return;
    }

    if (currentSession.length === 0) {
      if (chkStarOnly.checked && activeDeck.length > 0) {
        showFinishScreen(true, true); 
      } else {
        showFinishScreen(true, false); 
      }
      return;
    }

    if (currentIndex >= currentSession.length) {
      showFinishScreen(false, false);
      return;
    }

    btnKnown.style.visibility = 'visible';
    btnJump.style.display = 'inline-block';
    btnStar.style.display = 'block';
    btnAutoPlay.style.display = 'inline-block';
    btnSkipPrev.disabled = false;
    btnSkipNext.disabled = false;

    const card = currentSession[currentIndex];
    const textToShow = isFront ? card.front : card.back;
    
    if (starredIds.has(card.id)) {
      btnStar.textContent = '★';
      btnStar.className = 'star-btn active';
    } else {
      btnStar.textContent = '☆';
      btnStar.className = 'star-btn';
    }
    
    cardText.textContent = textToShow.replace(/\\n/g, '\n');
    sideLabel.style.display = 'block';
    sideLabel.textContent = isFront ? '表 (FRONT)' : '裏 (BACK)';
    sideLabel.style.background = isFront ? '#38bdf8' : '#f472b6';
    
    btnNext.textContent = isFront ? "答えを見る" : "次へ";
    lblPosition.textContent = `${currentIndex + 1} / ${currentSession.length}`;

    cardScrollArea.scrollTop = 0;

    if (playAudio) {
      if (isFront && chkSpeakFront.checked) {
        speakEnglish(card.front);
      } else if (!isFront && chkSpeakBack.checked) {
        speakEnglish(card.back);
      }
    }

    // ★ オートプレイのタイマー処理（画面が更新されるたびに再設定される）
    if (isAutoPlaying) {
      clearTimeout(autoPlayTimer);
      const waitSeconds = isFront ? AUTO_SEC_FRONT : AUTO_SEC_BACK;
      autoPlayTimer = setTimeout(() => {
        stepNext(null, true); // trueで文字選択判定を強制スルー
      }, waitSeconds * 1000);
    }
  }

  function showFinishScreen(isAllClear, isStarMode) {
    if (isAutoPlaying) toggleAutoPlay(); // ★ 完了画面で自動再生をストップ

    sideLabel.style.display = 'none';
    btnKnown.style.visibility = 'hidden';
    lblPosition.textContent = '- / -'; 
    btnJump.style.display = 'none';
    btnStar.style.display = 'none';
    btnSkipPrev.disabled = true;
    btnSkipNext.disabled = true;

    if (isAllClear) {
      if (isStarMode) {
        cardText.innerHTML = `
          <span class='finished-msg'>★カード完了！🎉</span>
          <span class='sub-msg'>まだ覚えていない★カードはありません。<br>「★のみ」のチェックを外してください。</span>
        `;
        btnNext.textContent = "チェックを外す";
      } else {
        cardText.innerHTML = `
          <span class='finished-msg'>全カード制覇！<br>おめでとうございます🎉</span>
          <span class='sub-msg'>「初期化」ボタンでリセットできます</span>
        `;
        btnNext.textContent = "全リセットして再開";
      }
    } else {
      cardText.innerHTML = `
        <span class='finished-msg'>この周は終了！</span>
        <span class='sub-msg'>
          次は、残りの <b>${currentSession.length}枚</b> で<br>スタートします
        </span>
      `;
      btnNext.textContent = "次の周をスタート";
    }
  }

  function stepNext(e, isBtnClick = false) {
    if(e) {
      e.stopPropagation();
      if (!isBtnClick && window.getSelection().toString().length > 0) {
        return;
      }
    }

    if (rawDeck.length === 0) return;
    
    let remaining = chkStarOnly.checked 
        ? activeDeck.filter(c => starredIds.has(c.id)).length 
        : activeDeck.length;

    if (currentIndex >= currentSession.length) {
      if (remaining === 0) {
        if (chkStarOnly.checked) {
          chkStarOnly.checked = false;
          saveToStorage();
          startRound();
        } else {
          fullReset();
        }
      } else {
        currentIndex = 0;
        startRound();
      }
      saveToStorage();
      return;
    }
    
    if (isFront) isFront = false;
    else { isFront = true; currentIndex++; }
    
    render(true);
    saveToStorage();
  }

  function stepPrev(e) {
    if(e) e.stopPropagation();
    if (currentSession.length === 0) return;
    if (currentIndex >= currentSession.length) {
      currentIndex = currentSession.length - 1;
      isFront = false;
      render(true);
      return;
    }
    if (currentIndex === 0 && isFront) return;
    if (!isFront) isFront = true;
    else { currentIndex--; isFront = false; }
    
    render(true);
    saveToStorage();
  }
</script>

</body>
</html>
